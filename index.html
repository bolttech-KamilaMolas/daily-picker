<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFinator — Daily Picker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="alf.png" alt="ALF" class="logo-img">
                <div class="logo-text">
                    <h1>ALFinator</h1>
                    <p class="subtitle">Kto dziś prowadzi daily?</p>
                </div>
            </div>
        </header>

        <section class="loading-section" id="loadingSection">
            <div class="spinner"></div>
            <p>Ładowanie danych...</p>
        </section>

        <section class="error-section hidden" id="errorSection">
            <p>⚠️ Nie udało się załadować pliku. Sprawdź połączenie.</p>
            <button class="btn btn-primary" id="retryBtn">🔄 Spróbuj ponownie</button>
        </section>

        <section class="picker-section hidden" id="pickerSection">
            <div class="week-info">
                <span class="week-label">📅 Tydzień:</span>
                <select id="weekSelect" class="week-select"></select>
            </div>

            <div class="available-list" id="availableList">
                <h3>Zespół <span class="hint">(odznacz nieobecnych)</span></h3>
                <div class="members" id="membersList"></div>
            </div>

            <div class="picker-action">
                <button class="btn btn-pick" id="pickBtn">
                    <span class="btn-icon">🎲</span> Losuj!
                </button>
            </div>

            <div class="result hidden" id="resultSection">
                <div class="result-card">
                    <div class="result-label">Dziś daily prowadzi:</div>
                    <div class="result-name" id="resultName"></div>
                    <button class="btn btn-secondary" id="rerollBtn">🔄 Losuj ponownie</button>
                </div>
            </div>
        </section>

        <section class="history-section hidden" id="historySection">
            <h3>📋 Historia tego tygodnia</h3>
            <div class="history-list" id="historyList">
                <p class="empty-state">Brak historii</p>
            </div>
            <button class="btn btn-danger btn-small" id="clearHistoryBtn">Wyczyść historię</button>
        </section>

        <footer class="footer">
            <p>Excel aktualizowany przez admina · Dane ładowane automatycznie z repo</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
